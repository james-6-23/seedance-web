name = "seedance-web"
main = "src/index.js"
compatibility_date = "2025-06-04"

[observability]
enabled = true

[assets]
binding = "assets"        # 静态资源绑定名（worker 内通过 env.assets 访问）
directory = "./public"    # 前端构建产物目录（由 frontend 构建生成）
not_found_handling = "single-page-application"
run_worker_first = true   # worker 先执行，便于拦截 /proxy

# 部署 / 本地 dev 前自动构建前端（Vue3 + Element Plus）
[build]
command = "npm --prefix ./frontend install && npm --prefix ./frontend run build"
