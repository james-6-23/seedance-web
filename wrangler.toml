name = "seedance-web"
main = "src/index.js"
compatibility_date = "2026-06-01"
workers_dev = true
preview_urls = true

[observability]
enabled = true
head_sampling_rate = 1

[assets]
binding = "assets"        # 静态资源绑定名（worker 内通过 env.assets 访问）
directory = "./public"    # 前端构建产物目录（由 frontend 构建生成）
not_found_handling = "single-page-application"
run_worker_first = true   # worker 先执行，便于拦截 /proxy

# 部署 / 本地 dev 前自动构建前端（Vue3 + Element Plus）
[build]
command = "npm run build:frontend"

# 临时图床：用户上传的参考图 / 参考视频暂存到 R2，生成完成后销毁
[[r2_buckets]]
binding = "UPLOADS"            # worker 内通过 env.UPLOADS 访问
bucket_name = "seedance-uploads"

# /upload 接口限频，防止被当成免费图床刷流量（每 60s 每 IP 20 次）
[[ratelimits]]
name = "UPLOAD_LIMITER"
namespace_id = "2001"
simple = { limit = 20, period = 60 }

